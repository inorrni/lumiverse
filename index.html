<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060504" />
    <meta name="description" content="작은 행동들의 여정을 따라 점점 더 또렷해지는 나만의 우주 — Lumiverse" />
    <title>Lumiverse</title>

    <!-- 파비콘 (Vite base 반영 → 빌드 시 /lumiverse/ 접두) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="canonical" href="https://inorrni.github.io/lumiverse/" />

    <!-- Open Graph (절대 URL — 크롤러는 상대경로를 해석하지 않음) -->
    <meta property="og:url" content="https://inorrni.github.io/lumiverse/" />
    <meta property="og:title" content="Lumiverse" />
    <meta property="og:description" content="작은 행동들의 여정을 따라 점점 더 또렷해지는 나만의 우주 — Lumiverse" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://inorrni.github.io/lumiverse/og_image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="825" />
    <meta property="og:site_name" content="Lumiverse" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card (og:image 재사용) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lumiverse" />
    <meta name="twitter:description" content="작은 행동들의 여정을 따라 점점 더 또렷해지는 나만의 우주 — Lumiverse" />
    <meta name="twitter:image" content="https://inorrni.github.io/lumiverse/og_image.png" />

    <!-- 폰트: Pretendard(본문) · Source Serif 4 + Noto Serif KR(세리프) · IBM Plex Mono(라벨) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+KR:wght@500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

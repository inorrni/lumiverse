name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개만 — 중간 실행은 취소
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm ci 대신 npm install — lock의 esbuild optional 플랫폼 패키지(@esbuild/*)가
      # 작성 npm 버전에 따라 extraneous 로 기록돼 CI npm ci 가 EBADPLATFORM 으로 실패.
      # npm install 은 현재 플랫폼에 맞는 optional 만 설치하고 나머지는 건너뛴다.
      - run: npm install --no-audit --no-fund
      # Vite 빌드 시 VITE_* 는 번들에 박힌다 → repo Secrets 를 빌드 env 로 주입해야
      # 배포본이 Supabase 에 연결된다. (Secrets 등록만으론 빌드에 안 들어감)
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # SPA 새로고침/딥링크 폴백 — 알 수 없는 경로도 앱 셸을 받게
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
